<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="../assets/styles/main.scss" />

  <title>Inscripción - Talleres</title>
</head>

<body class="speakers-page">

  <nav class="navbar navbar-expand-lg" aria-label="Navegación principal">
    <div class="container-fluid">

      <a class="navbar-brand" href="./home.html">
        Ayuntamiento&nbsp;<span class="navbar-brand__highlight">Valencia</span>
      </a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navMenu"
        aria-controls="navMenu"
        aria-expanded="false"
        aria-label="Abrir menú"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="navMenu">
        <ul class="navbar-nav gap-1">
          <li class="nav-item"><a class="nav-link" href="./home.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="./speakers.html">Ponentes</a></li>
          <li class="nav-item"><a class="nav-link" href="./article.html">Artículo</a></li>
          <li class="nav-item"><a class="nav-link active" href="./free.html">Inscripción</a></li>
        </ul>
      </div>

    </div>
  </nav>

  <main class="free">

    <!-- HEADER -->
    <header class="free__header container py-5 text-center">

      <span class="badge bg-warning text-dark mb-3" id="taller-badge">
        Inscripción abierta
      </span>

      <h1 class="free__title">
        Reserva tu plaza en los talleres
      </h1>

      <p class="free__subtitle">
        Elige una experiencia artesanal o inscríbete directamente desde el programa general.
      </p>

    </header>

    <!-- ALERT -->
    <div class="container">
      <div class="alert alert-success d-none" id="success-alert">
        ¡Inscripción realizada correctamente!
      </div>
    </div>

    <!-- FORM -->
    <section class="free__content container py-4">

      <div class="row g-4">

        <div class="col-12 col-lg-7">

          <div class="card shadow-sm">
            <div class="card-body">

              <h2 class="h4 mb-3" id="form-title">
                Formulario de inscripción
              </h2>

              <form>

                <div class="mb-3">
                  <label class="form-label">Nombre</label>
                  <input type="text" class="form-control" placeholder="Tu nombre">
                </div>

                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-control" placeholder="correo@ejemplo.com">
                </div>

                <div class="mb-3">
                  <label class="form-label">Taller</label>
                  <select class="form-select" id="taller-select">
                    <option value="general">Selecciona un taller</option>
                    <option value="ceramica">Cerámica</option>
                    <option value="textil">Textil</option>
                    <option value="madera">Madera</option>
                    <option value="forja">Forja</option>
                    <option value="cesteria">Cestería</option>
                  </select>
                </div>

                <div class="mb-3">
                  <label class="form-label">Comentarios</label>
                  <textarea class="form-control" rows="4"></textarea>
                </div>

                <button type="submit" class="btn btn-primary">
                  Inscribirme
                </button>

                <button type="reset" class="btn btn-outline-secondary">
                  Limpiar
                </button>

              </form>

            </div>
          </div>

        </div>

      </div>

    </section>

  </main>


  <script type="module" src="../assets/scripts/main.js"></script>
</body>
</html>
